<!DOCTYPE html>
<html>
<head>
<title>StudyBuddy</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#FFF8F2;
color:#333;
min-height:100vh;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:42px;
font-weight:bold;
color:#8C6FF7;
}

.logo span{
color:#FF9DB5;
}

.homeButton{
background:white;
border:none;
padding:14px 24px;
border-radius:18px;
font-size:18px;
cursor:pointer;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.container{
display:grid;
grid-template-columns:320px 1fr;
gap:30px;
}

.leftCard{
background:white;
border-radius:28px;
padding:25px;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.rightCard{
background:white;
border-radius:28px;
padding:35px;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.summaryTitle{
font-size:26px;
margin-bottom:20px;
color:#7B5CF3;
}

.summary{
line-height:1.8;
margin-bottom:30px;
}

#chick{
font-size:95px;
text-align:center;
margin:25px;
}

#message{
text-align:center;
font-size:20px;
font-weight:bold;
color:#6EBE44;
}

.progress{
height:18px;
background:#ECE6FF;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
}

#progressFill{
height:100%;
width:0%;
background:#7ED957;
transition:.3s;
}

.question{
font-size:30px;
font-weight:bold;
margin-bottom:30px;
}

.option{
width:100%;
padding:18px;
margin:12px 0;
font-size:20px;
border:none;
border-radius:18px;
background:#F7F5FF;
cursor:pointer;
transition:.2s;
}

.option:hover{
transform:translateY(-2px);
background:#EEE9FF;
}

.correct{
background:#C8F7C5 !important;
}

.wrong{
background:#FFD6D6 !important;
}

#next{
display:none;
margin-top:30px;
width:100%;
padding:20px;
font-size:22px;
border:none;
border-radius:18px;
background:#7ED957;
color:white;
cursor:pointer;
}

.score{
margin-top:25px;
font-size:22px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🐣 Study<span>Buddy</span></div>
<button class="homeButton" onclick="window.location.href='/'">🏠 Home</button>
</div>

<div class="container">

<div class="leftCard">
<div class="summaryTitle">✨ Summary</div>
<div class="summary">{{ summary }}</div>

<div id="chick">🐤</div>
<div id="message">Let's Study!</div>
</div>

<div class="rightCard">

<div class="progress">
<div id="progressFill"></div>
</div>

<div id="question"></div>
<div id="options"></div>

<button id="next" onclick="nextQuestion()">Continue →</button>

<div class="score">
Score: <span id="score">0</span>
</div>

</div>
</div>

<script>

let quiz = {{ quiz | tojson }};
let index = 0;
let score = 0;

console.log("TOTAL QUESTIONS:", quiz.length);

// --------------------
// LOAD QUESTION
// --------------------
function loadQuestion(){

if(index >= quiz.length){
endQuiz();
return;
}

let q = quiz[index];

document.getElementById("question").innerHTML =
`<div class="question">${q.question}</div>`;

let html = "";

// SAFE BUTTONS (NO STRING BREAKING BUG)
q.options.forEach(opt => {
    html += `
        <button class="option"
            onclick="checkAnswer(this)"
            data-selected="${encodeURIComponent(opt)}"
            data-correct="${encodeURIComponent(q.answer)}">
            ${opt}
        </button>
    `;
});

document.getElementById("options").innerHTML = html;

document.getElementById("next").style.display = "none";

updateProgress();
}

// --------------------
// SAFE ANSWER CHECK
// --------------------
function checkAnswer(btn){

let selected = decodeURIComponent(btn.dataset.selected);
let correct = decodeURIComponent(btn.dataset.correct);

let buttons = document.querySelectorAll(".option");
buttons.forEach(b => b.disabled = true);

if(selected === correct){
    btn.classList.add("correct");
    score++;
    document.getElementById("chick").innerText = "😄";
    document.getElementById("message").innerText = "Correct!";
} else {
    btn.classList.add("wrong");
    document.getElementById("chick").innerText = "😵";
    document.getElementById("message").innerText = "Oops!";
}

document.getElementById("score").innerText = score;
document.getElementById("next").style.display = "block";
}

// --------------------
// NEXT QUESTION
// --------------------
function nextQuestion(){
index++;
loadQuestion();
}

// --------------------
// PROGRESS BAR
// --------------------
function updateProgress(){
let percent = (index / quiz.length) * 100;
document.getElementById("progressFill").style.width = percent + "%";
}

// --------------------
// END SCREEN
// --------------------
function endQuiz(){
document.body.innerHTML = `
<div style="text-align:center; padding:50px;">
<h1>🎉 Finished!</h1>
<p>You scored ${score}/${quiz.length}</p>
<button onclick="window.location.href='/'"
style="padding:15px 25px; font-size:18px; border:none; border-radius:12px; background:#7ED957; color:white;">
Back Home
</button>
</div>
`;
}

loadQuestion();

</script>

</body>
</html>
