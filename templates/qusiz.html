<!DOCTYPE html>
<html>
<head>
    <title>StudyBuddy Quiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#FFF8F2;
    color:#333;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:28px;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.summaryTitle{
    font-size:26px;
    margin-bottom:10px;
    color:#7B5CF3;
}

.summary{
    line-height:1.7;
    margin-bottom:25px;
}

.question{
    font-size:26px;
    font-weight:bold;
    margin:20px 0;
}

.option{
    width:100%;
    padding:16px;
    margin:10px 0;
    font-size:18px;
    border:none;
    border-radius:16px;
    background:#F7F5FF;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    background:#EEE9FF;
}

.correct{ background:#C8F7C5 !important; }
.wrong{ background:#FFD6D6 !important; }

#next{
    display:none;
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:16px;
    background:#7ED957;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <div class="summaryTitle">✨ Summary</div>
    <div class="summary">{{ summary }}</div>

    <hr style="margin:20px 0;">

    <div id="question"></div>
    <div id="options"></div>

    <button id="next" onclick="nextQuestion()">Continue →</button>

</div>

<script>
let quiz = {{ quiz | tojson }};
let index = 0;
let score = 0;

function loadQuestion(){
    let q = quiz[index];

    document.getElementById("question").innerHTML =
        "<div class='question'>" + q.question + "</div>";

    let optionsHTML = "";

    q.options.forEach(opt => {
        optionsHTML += `
            <button class="option" onclick="checkAnswer(this, '${opt}', '${q.answer}')">
                ${opt}
            </button>
        `;
    });

    document.getElementById("options").innerHTML = optionsHTML;

    document.getElementById("next").style.display = "none";
}

function checkAnswer(btn, selected, correct){
    let buttons = document.querySelectorAll(".option");
    buttons.forEach(b => b.disabled = true);

    if(selected === correct){
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
    }

    document.getElementById("next").style.display = "block";
}

function nextQuestion(){
    index++;

    if(index >= quiz.length){
        document.body.innerHTML = `
            <div class="container">
                <h1>Done 🎉</h1>
                <p>Your score: ${score}/${quiz.length}</p>
            </div>
        `;
        return;
    }

    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
